services:
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    image: ai-website-cloner:latest
    container_name: ai-website-cloner
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    healthcheck:
      # The runner stage is node:*-slim, which ships no wget. Probe with the
      # Node runtime that is guaranteed to be present.
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: ai-website-cloner:dev
    container_name: ai-website-cloner-dev
    restart: unless-stopped
    ports:
      - "${DEV_PORT:-3001}:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
