# Production edge for the AI Product Comparison Advisor.
# Nginx is the only container published to the host. It fronts the Next.js
# frontend and the FastAPI backend on one origin, so the browser never calls
# a backend port directly and no cross-origin request is involved.
#
# HTTP only. TLS terminates one hop earlier, on the host nginx that owns the
# domain and the certificate; this container is bound to loopback and is only
# reachable through it.

# Preserve the scheme the browser actually used. Without this, $scheme is http
# at this hop and would overwrite the https value the host nginx forwarded.
map $http_x_forwarded_proto $forwarded_proto {
    default   $scheme;
    "~."      $http_x_forwarded_proto;
}

# The agent endpoints are unauthenticated and every call costs an upstream LLM
# request, so they are rate limited at the edge as well as in the application.
# 1r/s sustained with a burst of 10 absorbs normal typing bursts while cutting
# off scripted abuse. 10m holds roughly 160k client states.
limit_req_zone $binary_remote_addr zone=agent_api:10m rate=1r/s;
limit_req_status 429;

server {
    listen 80;
    server_name _;

    # Agent traffic can wait on an upstream LLM call; the nginx default of 60s
    # cuts those replies off mid-flight.
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;

    # Agent traffic: rate limited and body-capped before it can reach an LLM.
    # Declared before the generic /api/ prefix so it wins for these routes.
    location /api/v1/agent/ {
        limit_req zone=agent_api burst=10 nodelay;
        client_max_body_size 16k;
        proxy_pass http://backend:8000;
    }

    # The backend already mounts its routes at /api/v1/..., so the prefix is
    # passed through unchanged. Do not add a trailing slash to proxy_pass here:
    # that would strip /api/ and break every route.
    location /api/ {
        proxy_pass http://backend:8000;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
    }

    location / {
        proxy_pass http://frontend:3000;
    }
}
